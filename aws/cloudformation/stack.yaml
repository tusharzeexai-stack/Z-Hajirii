AWSTemplateFormatVersion: '2010-09-09'
Description: Z-Hajirii Attendance System - AWS Infrastructure (RDS + Lambda + API Gateway)

Parameters:
  AppName:
    Type: String
    Default: zhajirii
  DBName:
    Type: String
    Default: zhajirii_db
  DBUsername:
    Type: String
    Default: zhajirii_admin
    NoEcho: true
  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 8
  DBInstanceClass:
    Type: String
    Default: db.t3.micro

Resources:

  # ── VPC ──────────────────────────────────────────────────────────────
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true

  IGW:
    Type: AWS::EC2::InternetGateway

  IGWAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref IGW

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttach
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref IGW

  RTAssoc1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref RouteTable

  RTAssoc2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref RouteTable

  # ── Security Groups ───────────────────────────────────────────────────
  LambdaSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Lambda SG
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  RDSSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDS SG - allow Lambda
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref LambdaSG

  # ── RDS ──────────────────────────────────────────────────────────────
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub "${AppName} subnet group"
      SubnetIds: [!Ref PublicSubnet1, !Ref PublicSubnet2]

  RDS:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub "${AppName}-postgres"
      DBName: !Ref DBName
      DBInstanceClass: !Ref DBInstanceClass
      Engine: postgres
      EngineVersion: "16.9"
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      AllocatedStorage: "20"
      StorageType: gp2
      PubliclyAccessible: false
      VPCSecurityGroups: [!Ref RDSSG]
      DBSubnetGroupName: !Ref DBSubnetGroup
      BackupRetentionPeriod: 7

  # ── Secrets Manager ───────────────────────────────────────────────────
  DBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AppName}/db-credentials"
      SecretString: !Sub |
        {"host":"${RDS.Endpoint.Address}","port":5432,"dbname":"${DBName}","username":"${DBUsername}","password":"${DBPassword}"}

  # ── IAM Role ──────────────────────────────────────────────────────────
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AppName}-lambda-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: lambda.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecretsRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref DBSecret

  # ── Lambda Functions ──────────────────────────────────────────────────
  FnUsers:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AppName}-users"
      Runtime: nodejs20.x
      Handler: handlers/users.handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 30
      MemorySize: 256
      VpcConfig:
        SecurityGroupIds: [!Ref LambdaSG]
        SubnetIds: [!Ref PublicSubnet1, !Ref PublicSubnet2]
      Environment:
        Variables:
          DB_SECRET_ARN: !Ref DBSecret
          DB_HOST: !GetAtt RDS.Endpoint.Address
          DB_PORT: "5432"
          DB_NAME: !Ref DBName
          DB_USER: !Ref DBUsername
          DB_PASS: !Ref DBPassword
      Code:
        ZipFile: "exports.handler=async()=>({statusCode:200,body:'{}'})"

  FnEmployees:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AppName}-employees"
      Runtime: nodejs20.x
      Handler: handlers/employees.handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 30
      MemorySize: 256
      VpcConfig:
        SecurityGroupIds: [!Ref LambdaSG]
        SubnetIds: [!Ref PublicSubnet1, !Ref PublicSubnet2]
      Environment:
        Variables:
          DB_SECRET_ARN: !Ref DBSecret
          DB_HOST: !GetAtt RDS.Endpoint.Address
          DB_PORT: "5432"
          DB_NAME: !Ref DBName
          DB_USER: !Ref DBUsername
          DB_PASS: !Ref DBPassword
      Code:
        ZipFile: "exports.handler=async()=>({statusCode:200,body:'{}'})"

  FnAttendance:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AppName}-attendance-logs"
      Runtime: nodejs20.x
      Handler: handlers/attendance_logs.handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 30
      MemorySize: 256
      VpcConfig:
        SecurityGroupIds: [!Ref LambdaSG]
        SubnetIds: [!Ref PublicSubnet1, !Ref PublicSubnet2]
      Environment:
        Variables:
          DB_SECRET_ARN: !Ref DBSecret
          DB_HOST: !GetAtt RDS.Endpoint.Address
          DB_PORT: "5432"
          DB_NAME: !Ref DBName
          DB_USER: !Ref DBUsername
          DB_PASS: !Ref DBPassword
      Code:
        ZipFile: "exports.handler=async()=>({statusCode:200,body:'{}'})"

  FnTasks:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AppName}-tasks"
      Runtime: nodejs20.x
      Handler: handlers/tasks.handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 30
      MemorySize: 256
      VpcConfig:
        SecurityGroupIds: [!Ref LambdaSG]
        SubnetIds: [!Ref PublicSubnet1, !Ref PublicSubnet2]
      Environment:
        Variables:
          DB_SECRET_ARN: !Ref DBSecret
          DB_HOST: !GetAtt RDS.Endpoint.Address
          DB_PORT: "5432"
          DB_NAME: !Ref DBName
          DB_USER: !Ref DBUsername
          DB_PASS: !Ref DBPassword
      Code:
        ZipFile: "exports.handler=async()=>({statusCode:200,body:'{}'})"

  FnLeaves:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AppName}-leave-requests"
      Runtime: nodejs20.x
      Handler: handlers/leave_requests.handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 30
      MemorySize: 256
      VpcConfig:
        SecurityGroupIds: [!Ref LambdaSG]
        SubnetIds: [!Ref PublicSubnet1, !Ref PublicSubnet2]
      Environment:
        Variables:
          DB_SECRET_ARN: !Ref DBSecret
          DB_HOST: !GetAtt RDS.Endpoint.Address
          DB_PORT: "5432"
          DB_NAME: !Ref DBName
          DB_USER: !Ref DBUsername
          DB_PASS: !Ref DBPassword
      Code:
        ZipFile: "exports.handler=async()=>({statusCode:200,body:'{}'})"

  FnNotifications:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AppName}-notifications"
      Runtime: nodejs20.x
      Handler: handlers/notifications.handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 30
      MemorySize: 256
      VpcConfig:
        SecurityGroupIds: [!Ref LambdaSG]
        SubnetIds: [!Ref PublicSubnet1, !Ref PublicSubnet2]
      Environment:
        Variables:
          DB_SECRET_ARN: !Ref DBSecret
          DB_HOST: !GetAtt RDS.Endpoint.Address
          DB_PORT: "5432"
          DB_NAME: !Ref DBName
          DB_USER: !Ref DBUsername
          DB_PASS: !Ref DBPassword
      Code:
        ZipFile: "exports.handler=async()=>({statusCode:200,body:'{}'})"

  FnAuditLogs:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AppName}-audit-logs"
      Runtime: nodejs20.x
      Handler: handlers/audit_logs.handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 30
      MemorySize: 256
      VpcConfig:
        SecurityGroupIds: [!Ref LambdaSG]
        SubnetIds: [!Ref PublicSubnet1, !Ref PublicSubnet2]
      Environment:
        Variables:
          DB_SECRET_ARN: !Ref DBSecret
          DB_HOST: !GetAtt RDS.Endpoint.Address
          DB_PORT: "5432"
          DB_NAME: !Ref DBName
          DB_USER: !Ref DBUsername
          DB_PASS: !Ref DBPassword
      Code:
        ZipFile: "exports.handler=async()=>({statusCode:200,body:'{}'})"

  FnChat:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AppName}-chat-messages"
      Runtime: nodejs20.x
      Handler: handlers/chat_messages.handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 30
      MemorySize: 256
      VpcConfig:
        SecurityGroupIds: [!Ref LambdaSG]
        SubnetIds: [!Ref PublicSubnet1, !Ref PublicSubnet2]
      Environment:
        Variables:
          DB_SECRET_ARN: !Ref DBSecret
          DB_HOST: !GetAtt RDS.Endpoint.Address
          DB_PORT: "5432"
          DB_NAME: !Ref DBName
          DB_USER: !Ref DBUsername
          DB_PASS: !Ref DBPassword
      Code:
        ZipFile: "exports.handler=async()=>({statusCode:200,body:'{}'})"

  # ── API Gateway ───────────────────────────────────────────────────────
  Api:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "${AppName}-api"
      EndpointConfiguration:
        Types: [REGIONAL]

  # /users
  RUsers: { Type: AWS::ApiGateway::Resource, Properties: { RestApiId: !Ref Api, ParentId: !GetAtt Api.RootResourceId, PathPart: users } }
  MUsers: { Type: AWS::ApiGateway::Method, Properties: { RestApiId: !Ref Api, ResourceId: !Ref RUsers, HttpMethod: ANY, AuthorizationType: NONE, Integration: { Type: AWS_PROXY, IntegrationHttpMethod: POST, Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FnUsers.Arn}/invocations" } } }
  PUsers: { Type: AWS::Lambda::Permission, Properties: { FunctionName: !Ref FnUsers, Action: lambda:InvokeFunction, Principal: apigateway.amazonaws.com, SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/*" } }

  # /employees
  REmployees: { Type: AWS::ApiGateway::Resource, Properties: { RestApiId: !Ref Api, ParentId: !GetAtt Api.RootResourceId, PathPart: employees } }
  MEmployees: { Type: AWS::ApiGateway::Method, Properties: { RestApiId: !Ref Api, ResourceId: !Ref REmployees, HttpMethod: ANY, AuthorizationType: NONE, Integration: { Type: AWS_PROXY, IntegrationHttpMethod: POST, Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FnEmployees.Arn}/invocations" } } }
  PEmployees: { Type: AWS::Lambda::Permission, Properties: { FunctionName: !Ref FnEmployees, Action: lambda:InvokeFunction, Principal: apigateway.amazonaws.com, SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/*" } }

  # /attendance_logs
  RAttendance: { Type: AWS::ApiGateway::Resource, Properties: { RestApiId: !Ref Api, ParentId: !GetAtt Api.RootResourceId, PathPart: attendance_logs } }
  MAttendance: { Type: AWS::ApiGateway::Method, Properties: { RestApiId: !Ref Api, ResourceId: !Ref RAttendance, HttpMethod: ANY, AuthorizationType: NONE, Integration: { Type: AWS_PROXY, IntegrationHttpMethod: POST, Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FnAttendance.Arn}/invocations" } } }
  PAttendance: { Type: AWS::Lambda::Permission, Properties: { FunctionName: !Ref FnAttendance, Action: lambda:InvokeFunction, Principal: apigateway.amazonaws.com, SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/*" } }

  # /tasks
  RTasks: { Type: AWS::ApiGateway::Resource, Properties: { RestApiId: !Ref Api, ParentId: !GetAtt Api.RootResourceId, PathPart: tasks } }
  MTasks: { Type: AWS::ApiGateway::Method, Properties: { RestApiId: !Ref Api, ResourceId: !Ref RTasks, HttpMethod: ANY, AuthorizationType: NONE, Integration: { Type: AWS_PROXY, IntegrationHttpMethod: POST, Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FnTasks.Arn}/invocations" } } }
  PTasks: { Type: AWS::Lambda::Permission, Properties: { FunctionName: !Ref FnTasks, Action: lambda:InvokeFunction, Principal: apigateway.amazonaws.com, SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/*" } }

  # /leave_requests
  RLeaves: { Type: AWS::ApiGateway::Resource, Properties: { RestApiId: !Ref Api, ParentId: !GetAtt Api.RootResourceId, PathPart: leave_requests } }
  MLeaves: { Type: AWS::ApiGateway::Method, Properties: { RestApiId: !Ref Api, ResourceId: !Ref RLeaves, HttpMethod: ANY, AuthorizationType: NONE, Integration: { Type: AWS_PROXY, IntegrationHttpMethod: POST, Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FnLeaves.Arn}/invocations" } } }
  PLeaves: { Type: AWS::Lambda::Permission, Properties: { FunctionName: !Ref FnLeaves, Action: lambda:InvokeFunction, Principal: apigateway.amazonaws.com, SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/*" } }

  # /notifications
  RNotifs: { Type: AWS::ApiGateway::Resource, Properties: { RestApiId: !Ref Api, ParentId: !GetAtt Api.RootResourceId, PathPart: notifications } }
  MNotifs: { Type: AWS::ApiGateway::Method, Properties: { RestApiId: !Ref Api, ResourceId: !Ref RNotifs, HttpMethod: ANY, AuthorizationType: NONE, Integration: { Type: AWS_PROXY, IntegrationHttpMethod: POST, Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FnNotifications.Arn}/invocations" } } }
  PNotifs: { Type: AWS::Lambda::Permission, Properties: { FunctionName: !Ref FnNotifications, Action: lambda:InvokeFunction, Principal: apigateway.amazonaws.com, SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/*" } }

  # /audit_logs
  RAudit: { Type: AWS::ApiGateway::Resource, Properties: { RestApiId: !Ref Api, ParentId: !GetAtt Api.RootResourceId, PathPart: audit_logs } }
  MAudit: { Type: AWS::ApiGateway::Method, Properties: { RestApiId: !Ref Api, ResourceId: !Ref RAudit, HttpMethod: ANY, AuthorizationType: NONE, Integration: { Type: AWS_PROXY, IntegrationHttpMethod: POST, Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FnAuditLogs.Arn}/invocations" } } }
  PAudit: { Type: AWS::Lambda::Permission, Properties: { FunctionName: !Ref FnAuditLogs, Action: lambda:InvokeFunction, Principal: apigateway.amazonaws.com, SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/*" } }

  # /chat_messages
  RChat: { Type: AWS::ApiGateway::Resource, Properties: { RestApiId: !Ref Api, ParentId: !GetAtt Api.RootResourceId, PathPart: chat_messages } }
  MChat: { Type: AWS::ApiGateway::Method, Properties: { RestApiId: !Ref Api, ResourceId: !Ref RChat, HttpMethod: ANY, AuthorizationType: NONE, Integration: { Type: AWS_PROXY, IntegrationHttpMethod: POST, Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FnChat.Arn}/invocations" } } }
  PChat: { Type: AWS::Lambda::Permission, Properties: { FunctionName: !Ref FnChat, Action: lambda:InvokeFunction, Principal: apigateway.amazonaws.com, SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/*" } }

  # Deployment & Stage
  ApiDeploy:
    Type: AWS::ApiGateway::Deployment
    DependsOn: [MUsers, MEmployees, MAttendance, MTasks, MLeaves, MNotifs, MAudit, MChat]
    Properties:
      RestApiId: !Ref Api

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref Api
      DeploymentId: !Ref ApiDeploy
      StageName: prod

Outputs:
  ApiGatewayUrl:
    Description: Set this as VITE_API_GATEWAY_URL in your .env
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com/prod"
    Export:
      Name: !Sub "${AppName}-api-url"

  RDSEndpoint:
    Value: !GetAtt RDS.Endpoint.Address
    Export:
      Name: !Sub "${AppName}-rds-endpoint"
